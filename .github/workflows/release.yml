  macos-build-x86_64:
    runs-on: ${{ needs.container-info.outputs.MACOS_VER }}
    name: Build android-tools on macOS (x86_64)
    needs: [container-info, setup-source-repo]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source
      - name: Extract source
        run: tar -xf source.tar

      - name: Install dependencies
        run: brew install meson cmake
      - name: Setup the builddir
        run: >
          meson setup build --cross-file nativefiles/release_configuration.ini
          --cross-file nativefiles/release_configuration_standardlayout.ini
          --cross-file "crossfiles/macos x86_64.ini"
          --native-file "nativefiles/macos cpp_std fix.ini"
          --licensedir license
      - name: Build
        run: ninja -C build
      - name: Install
        run: |
          mkdir x86_64
          meson install -C build --destdir "$PWD/x86_64"
      - name: Generate SBOM
        run: >
          python3 SBOM_scripts/macos.py
          $(realpath .)
          x86_64/license/depmf.json
          "pkg:github/${{ github.repository }}"
          x86_64/license/nmeum_patches.bin
          x86_64/license/added_patches.bin
          "https://github.com/${{ github.repository }}"
          https://github.com/"${{ github.repository }}"/blob/'${ref}/${path}'
          x86_64
          ${{ needs.container-info.outputs.MACOS_VER }}
          $GH_RELEASE_VER
          build
          > x86_64/SBOM.json
      - name: Delete licensedir
        run: rm -r x86_64/license
      - name: Archive the artifacts
        run: tar -cf x86_64.tar x86_64
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-x86_64
          path: x86_64.tar
          retention-days: 1

  macos-build-aarch64:
    runs-on: ${{ needs.container-info.outputs.MACOS_VER }}
    name: Build android-tools on macOS (arm64)
    needs: [container-info, setup-source-repo]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source
      - name: Extract source
        run: tar -xf source.tar

      - name: Install dependencies
        run: brew install meson cmake
      - name: Setup the builddir
        run: >
          meson setup build --native-file nativefiles/release_configuration.ini
          --native-file nativefiles/release_configuration_standardlayout.ini
          --native-file "nativefiles/macos arm64.ini"
          --licensedir license
      - name: Build
        run: ninja -C build
      - name: Install
        run: |
          mkdir aarch64
          meson install -C build --destdir "$PWD/aarch64"
      - name: Generate SBOM
        run: >
          python3 SBOM_scripts/macos.py
          $(realpath .)
          aarch64/license/depmf.json
          "pkg:github/${{ github.repository }}"
          aarch64/license/nmeum_patches.bin
          aarch64/license/added_patches.bin
          "https://github.com/${{ github.repository }}"
          https://github.com/"${{ github.repository }}"/blob/'${ref}/${path}'
          aarch64
          ${{ needs.container-info.outputs.MACOS_VER }}
          $GH_RELEASE_VER
          build
          > aarch64/SBOM.json
      - name: Delete licensedir
        run: rm -r aarch64/license
      - name: Archive the artifacts
        run: tar -cf aarch64.tar aarch64
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: osx-build-arm64
          path: aarch64.tar
          retention-days: 1

  macos-build:
    runs-on: ${{ needs.container-info.outputs.MACOS_VER }}
    name: Build android-tools on macOS
    needs: [container-info, macos-build-x86_64, macos-build-aarch64]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-build-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: osx-build-arm64
      - name: Extract built executables
        run: |
          tar -xf x86_64.tar
          tar -xf aarch64.tar

      # https://developer.apple.com/documentation/apple-silicon/building-a-universal-macos-binary#Update-the-Architecture-List-of-Custom-Makefiles
      - name: Create universal executables
        shell: zsh {0}
        run: |
          mkdir android-tools-static
          for exec in x86_64/*(*); do
            basename="$(basename "$exec")"
            lipo -create -output "android-tools-static/$basename" "$exec" "aarch64/$basename"
          done
      - name: Copy data over
        run: |
          cp x86_64/SBOM.json android-tools-static/x86_64-SBOM.json
          cp aarch64/SBOM.json android-tools-static/aarch64-SBOM.json
          cp -r x86_64/bash-completion android-tools-static/

      - name: Tar up the artifacts
        run: tar -cf android-tools-static-macos-universal2.tar.gz android-tools-static
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: osx-build
          path: android-tools-static-macos-universal2.tar.gz
          retention-days: 1

  process-archives:
    runs-on: ${{ needs.container-info.outputs.LINUX_VER }}
    name: Process all built archives
    needs: [container-info, setup-source-repo, win-build, linux-build, linux-build-cross, macos-build]

    steps:
      - uses: actions/download-artifact@v4
      - name: Extract and process all raw archives
        env:
          PROJECT_VERSION: ${{ needs.container-info.outputs.PROJECT_VERSION }}
        run: |
          set -eu
          to_release=()
          function handle_archive_universally() {
            if [[ $# -ne 3 ]]; then
              return 1
            fi
            RAW_ARCHIVE_NAME="$1"
            OS="$2"
            ARCH="$3"

            NATIVELAYOUT="android-tools-static-$PROJECT_VERSION-$OS-nativelayout-$ARCH"
            STANDARDLAYOUT="android-tools-static-$OS-standardlayout-$ARCH"
            STANDARDLAYOUTEX="android-tools-static-$OS-standardlayout-extra-$ARCH"

            # Extract the input archive. The contents of this archive are expected to be extracted
            # to android-tools-static/.
            # The contents of this archive are modified and removed from. Archives of all layouts
            # are created during the process.
            tar -oxf "$RAW_ARCHIVE_NAME"

            if [[ "$OS" == "windows" ]]; then
              rm -rf android-tools-static/bash-completion/
            fi

            if [[ "$OS" == "macos" ]]; then
              # macOS universal2 has two SBOMs per archive.
              for sbom_path in android-tools-static/*-SBOM.json; do
                BASENAME="$(basename "$sbom_path")"
                SBOM_ARCH="${BASENAME%-SBOM.json}"
                SBOM_PATH="android-tools-static-$PROJECT_VERSION-$OS-$SBOM_ARCH-SBOM.json"
                mv "$sbom_path" "$SBOM_PATH"
                to_release+=("$SBOM_PATH")
              done
            else
              # Remove SBOM from the archive, give it an appropriate name and add it
              # to to_release.
              SBOM_PATH="android-tools-static-$PROJECT_VERSION-$OS-$ARCH-SBOM.json"
              mv "android-tools-static/SBOM.json" "$SBOM_PATH"
              to_release+=("$SBOM_PATH")
            fi

            #
            # nativelayout
            #
            mv android-tools-static "$NATIVELAYOUT"

            if [[ "$OS" == "windows" ]]; then
              zip -r "$NATIVELAYOUT.zip" "$NATIVELAYOUT"
              to_release+=("$NATIVELAYOUT.zip")
            else
              tar -cf "$NATIVELAYOUT.tar.gz" "$NATIVELAYOUT"
              to_release+=("$NATIVELAYOUT.tar.gz")
            fi

            #
            # standardlayout-extra
            #
            mv "$NATIVELAYOUT" android-tools-static

            rm -rf android-tools-static/bash-completion/

            if [[ "$OS" == "windows" ]]; then
              for executable in android-tools-static/*.exe; do
                mv "$executable" "${executable/.exe}"
              done
            fi

            tar -cf "$STANDARDLAYOUTEX.tar.gz" android-tools-static
            to_release+=("$STANDARDLAYOUTEX.tar.gz")

            #
            # standardlayout
            #
            if [[ "$OS" == "windows" ]]; then
              cp "$STANDARDLAYOUTEX.tar.gz" "$STANDARDLAYOUT.tar.gz"
              to_release+=("$STANDARDLAYOUT.tar.gz")
            else
              for exe in android-tools-static/*; do
                [[ -x "$exe" ]] || continue
                [[ "$exe" == *".dll" ]] && continue

                # Follow the requirements stated in README.
                BASENAME="$(basename "$exe")"
                if [[ $BASENAME != adb && \
                      $BASENAME != append2simg && \
                      $BASENAME != fastboot && \
                      $BASENAME != img2simg && \
                      $BASENAME != simg2img ]]; then
                  rm "$exe"
                fi
              done

              tar -cf "$STANDARDLAYOUT.tar.gz" android-tools-static
              to_release+=("$STANDARDLAYOUT.tar.gz")
              rm -rf android-tools-static
            fi
          }
          handle_archive_universally windows-build-x86_64/android-tools-static-windows-x86_64.tar windows x86_64
          handle_archive_universally windows-build-x86/android-tools-static-windows-x86.tar windows x86
          handle_archive_universally linux-build-x86_64/android-tools-static-linux-x86_64.tar linux x86_64
          for arch in aarch64 ppc64le riscv64 armv6l armv7l; do
            handle_archive_universally linux-build-$arch/android-tools-static-linux-$arch.tar linux $arch
          done
          handle_archive_universally osx-build/android-tools-static-macos-universal2.tar.gz macos universal2

          SOURCE_AR_NAME="android-tools-static-$PROJECT_VERSION-src"

          mkdir "$SOURCE_AR_NAME"
          tar -C "$SOURCE_AR_NAME" -xf source/source.tar
          touch "$SOURCE_AR_NAME/nopatch"

          tar -cf "$SOURCE_AR_NAME.tar.gz" "$SOURCE_AR_NAME"

          to_release+=("$SOURCE_AR_NAME.tar.gz")

          tar -cf release-artifacts.tar "${to_release[@]}"
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts.tar
          retention-days: 1

  release:
    runs-on: ${{ needs.container-info.outputs.LINUX_VER }}
    name: Publish release
    needs: [container-info, process-archives]

    environment: review-block

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Extract archive
        run: |
          mkdir artifacts
          tar -ox -C artifacts -f release-artifacts.tar
      - name: Get archive contents
        id: artifacts
        run: |
          set -eu
          names=()
          for artifact in artifacts/*; do
            names+=("$(basename "$artifact")")
          done
          echo -n FILES=; printf '%s\0' "${names[@]}" | jq -Rsc '[split("\u0000")[] | select(. != "")]' >> "$GITHUB_OUTPUT"
      - name: Move archive contents to CWD
        run: mv artifacts/* .
      - name: Create GitHub Release
        # The hash below **must** be kept up-to-date with the hash specified in GH_RELEASE_VER
        # at the top of this file
        # v2.3.2
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        with:
          # body_path: MESSAGE
          # prerelease: true
          # draft: true
          files: ${{ fromJSON(steps.artifacts.outputs.FILES) }}
